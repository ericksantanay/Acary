<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela inicial</title>
    <link rel="shortcut icon" href="src/assets/image/favicon (2).ico" type="image/x-icon">
    <link rel="stylesheet" href="src/global/style/cssGlobal.css">
    <link rel="stylesheet" href="src/features/inicio/inicio.css">
    <link rel="stylesheet" href="src/global/style/header.css">
    <link rel="stylesheet" href="src/features/inicio/formularios.css">
</head>
<body>

    <!--Header-->
    <header>

        <div id="container-logo">
            <img src="src/assets/image/Acary(Logo).png" alt="Logo Acary">
            <h1 id="seja-bem-vindo">Olá! Seja bem-vindo(a).</h1>
            <h1 id="titulo-familia">Família</h1>
            <h1 id="titulo-baba">Babá</h1>
        </div>

    </header>

    <!-- Main -->
    <main>

        <div class="card-redirecionamento" onclick="mudarParaFamilia()">
            
            <div class="titulo-card">
                <h2>Eu sou <br> <strong>Família</strong></h2>
            </div>

            <div class="container-seta">
                <img src="src/assets/icones/seta-link (1).png" alt="Seta Link">
            </div>

        </div>    

        <div class="card-redirecionamento" onclick="mudarParaBaba()">
            
            <div class="titulo-card">
                <h2>Eu sou <br> <strong>Babá</strong></h2>
            </div>
            
            <div class="container-seta">
                <img src="src/assets/icones/seta-link (1).png" alt="Seta Link">
            </div>
        </div>

        <div id="container-acesso">

            <form id="formulario-login-familia">

                <div class="container-inputs-e-label">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="Ex: examplo123@gmail.com" required>
                </div>

                <div class="container-inputs-e-label">
                    <label for="senha">Senha</label>
                    <input type="email" name="senha" id="senha" placeholder="Ex: exemplo1234" required>
                </div>
                
                <div id="btn-familia">
                    <button type="button" class="btn-voltar" onclick="voltar()">Voltar</button>
                    <button type="submit" id="btn-acessar-familia">Acessar</button>
                </div>

            </form>


            <!-- Formulario login babas -->
            <form id="formulario-login-baba">

                <div class="container-inputs-e-label">
                    <label for="email-baba">E-mail</label>
                    <input type="email-baba" name="email-baba" id="email-baba" placeholder="Ex: examplo123@gmail.com " required>
                </div>

                <div class="container-inputs-e-label">
                    <label for="senha-baba">Senha</label>
                    <input type="email-baba" name="senha-baba" id="senha-baba" placeholder="Ex: exemplo1234" required>
                </div>

                
                <div id="btn-baba">
                    <button type="button" class="btn-voltar" onclick="voltar()">Voltar</button>
                    <button type="submit" id="btn-acessar-baba">Acessar</button>
                </div>

            </form>

        </div>

        <!-- Link de cadastro dos usuarios -->
        <div id="link-cadastro">
            <a href="http://127.0.0.1:5500/frontend/src/features/cadastroUsers/cadastro.html">Não tem conta? <span>Cadastre-se</span></a>
        </div>

    </main>

    <script src="dist/features/inicio/redirecionamentoFamilia.js"></script>
    
</body>
</html>
