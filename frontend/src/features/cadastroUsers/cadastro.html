<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuarios</title>
    <link rel="stylesheet" href="../../global//style/cssGlobal.css">
    <link rel="stylesheet" href="../../global/style/header.css">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=visibility" />
</head>
<body>

    <!--Header-->
    <header>

        <div id="container-logo">
            <img src="../../assets/image/Acary(Logo).png" alt="Logo Acary">
            <h1>Olá! Seja bem-vindo(a).</h1>
        </div>

    </header>

    <main>
        <!--Section do formulario de cadastro-->
        <section>
            
            <form id="fomulario-cadastro">
                
                <div class="container-campo">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome" placeholder="Ex: João Silva" required>
                </div>

                <div class="container-campo">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="Ex:  joaosilva@gmail.com" required>
                </div>

                <div class="container-campo">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="Ex: exemplo123" required>
                    <span class="material-symbols-outlined">visibility</span>
                </div>

                <div class="container-campo">
                    <select name="perfil" id="perfil">
                        <option value="Seu Perfil" disabled selected>Seu Perfil</option>
                        <option value="Família">Família</option>
                        <option value="Babá">Babá</option>
                    </select>
                </div>
                
                <div class="container-botoes">
                    <button id="btn-voltar"><a href="#">Voltar</a></button>
                    <button type="submit" id="btn-cadastro">Cadastro</button>
                </div>

            </form>

        </section>
    </main>
    
</body>
</html>
